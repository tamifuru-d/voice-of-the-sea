  <circle cx="256" cy="256" r="24" fill="#0b1426" stroke="#c9a55c" stroke-width="3"/>
  <circle cx="256" cy="256" r="10" fill="#c9a55c"/>

  <!-- N label -->
  <text x="256" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#c9a55c">N</text>
